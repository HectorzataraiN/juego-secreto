<!DOCTYPE html>
<html lang="es-mx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>JS Game</title>
</head>

<body>

    <div class="container">
        <div class="container__contenido">
            <div class="container__informaciones">
                <div class="container__texto">
                    <h1>Juego del número secreto.</h1>
                </div>

                <div class="container__dificultad">
                    <label for="dificultad">Dificultad:</label>

                    <select id="dificultad" class="container__input">
                        <option value="10">Fácil (1 - 10)</option>
                        <option value="50">Media (1 - 50)</option>
                        <option value="100">Difícil (1 - 100)</option>
                    </select>
                </div>

                <div class="container__texto">
                    <p class="texto__parrafo"></p>
                    <p class="texto__intentos"></p>
                </div>

                <input type="number" id="valorUsuario" min="1" class="container__input">

                <div class="chute container__botones">
                    <button onclick="verificarIntento();" class="container__boton">
                        Intentar
                    </button>

                    <button onclick="reiniciarJuego();" class="container__boton" id="reiniciar" disabled>
                        Nuevo juego
                    </button>
                </div>
            </div>
            <img src="./img/detective-amongus.webp" alt="Una persona mirando a la izquierda" class="container__imagen-persona" />
        </div>
    </div>



    <script src="app.js"></script>

</body>

</html>
